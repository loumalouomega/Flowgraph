name: Publish to NPM

# Publishes the `@kratos-flowgraph/flowgraph` package to the NPM registry.
#
# Triggers automatically on every pushed tag matching `v*` (e.g. `v1.2.3`),
# so a normal `npm version patch && git push --tags` publishes a release.
# Also runs when a GitHub Release is published, and can be started manually.
#
# Note: for a tag-push trigger, GitHub uses the workflow file AND package.json
# from the tagged commit — so always tag a commit that contains this workflow
# and the version you intend to publish.
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
